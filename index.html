<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Auto Sound Site</title>
</head>

<body style="text-align:center; font-family:Arial; margin-top:80px;">

<h2>Сайт со звуком 🔊</h2>

<p>Если звук не включился автоматически — нажми кнопку</p>

<button onclick="enableAndPlay()" style="font-size:18px; padding:12px 25px;">
  🔊 Включить звук
</button>

<audio id="sound" loop>
  <source src="img2.mp3" type="audio/mpeg">
</audio>

<script>
let audio = document.getElementById("sound");

// попытка автозапуска при заходе
window.addEventListener("load", function () {
  audio.volume = 1;

  let playPromise = audio.play();

  if (playPromise !== undefined) {
    playPromise.catch(() => {
      console.log("Автозвук заблокирован браузером");
    });
  }
});

// кнопка для гарантированного запуска
function enableAndPlay() {
  audio.play();
}
</script>

</body>
</html>
